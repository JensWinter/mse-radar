name: Acceptance tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Docker image tag to test against (default: latest)'
        required: false
        default: 'latest'

env:
  CI: true

concurrency:
  group: acceptance-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/docker-build.yml
    permissions:
      contents: read
      packages: write

  acceptance:
    name: Run acceptance tests
    needs: [build-image]
    if: always() && !failure()
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: mse_radar
          POSTGRES_PASSWORD: mse_radar
          POSTGRES_DB: mse_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mse_radar:mse_radar@localhost:5432/mse_radar
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_URL: http://localhost:4322
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.11
          cache: true

      - name: Install Deno dependencies
        run: deno install

      - name: Run database migrations and seed
        run: |
          deno run --allow-env --allow-read --allow-net deno_scripts/db/migrate.ts
          deno run --allow-env --allow-read --allow-net deno_scripts/db_better-auth/migrate.ts
          deno run --allow-env --allow-read --allow-net deno_scripts/db/seed_dora_capabilities.ts

      - name: Determine image ref
        id: image
        run: |
          if [ -n "${{ needs.build-image.outputs.image }}" ] && [ -n "${{ needs.build-image.outputs.tag }}" ]; then
            IMAGE="${{ needs.build-image.outputs.image }}"
            TAG="${{ needs.build-image.outputs.tag }}"
          else
            IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mse-radar"
            TAG="${{ inputs.image-tag || 'latest' }}"
          fi
          echo "ref=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start app container
        run: |
          for i in $(seq 1 5); do
            docker pull "${{ steps.image.outputs.ref }}" && break
            sleep 3
          done
          if ! docker image inspect "${{ steps.image.outputs.ref }}" > /dev/null 2>&1; then
            echo "Failed to pull image after 5 attempts"
            exit 1
          fi
          docker run -d --name mse-radar-sut \
            --network host \
            -e DATABASE_URL="${{ env.DATABASE_URL }}" \
            -e BETTER_AUTH_SECRET="${{ env.BETTER_AUTH_SECRET }}" \
            -e BETTER_AUTH_URL="${{ env.BETTER_AUTH_URL }}" \
            -e NODE_ENV=acceptance \
            -e HOST=0.0.0.0 \
            -e PORT=4322 \
            ${{ steps.image.outputs.ref }}

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4322/ > /dev/null 2>&1; then
              echo "App is ready"
              curl -s -o /dev/null -w "HTTP status: %{http_code}\n" http://localhost:4322/
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start within 30s"
          docker logs mse-radar-sut
          exit 1

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('deno.lock') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Run acceptance tests
        run: |
          deno test --permit-no-files --allow-all \
            --junit-path=./acceptance-tests-report.xml \
            'acceptance/tests/*.spec.ts'
        env:
          ACCEPTANCE_SUT_MANAGED: 'true'
          ACCEPTANCE_SUT_BASE_URL: http://localhost:4322

      - name: Print app container logs
        if: ${{ !cancelled() }}
        run: docker logs mse-radar-sut

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: Acceptance tests
          path: acceptance-tests-report.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: acceptance-tests-report
          path: acceptance-tests-report.xml
          retention-days: 30
