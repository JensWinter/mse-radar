name: Build and Push Docker Image

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      image:
        description: Full image name (without tag)
        value: ${{ jobs.build-and-push.outputs.image }}
      tag:
        description: Image tag (commit SHA)
        value: ${{ jobs.build-and-push.outputs.tag }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mse-radar" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./astro
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && format('{0}:latest', steps.meta.outputs.image) || '' }}
