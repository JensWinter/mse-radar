name: Build and Push Docker Image

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      image:
        description: Full image name (without tag)
        value: ${{ jobs.build-and-push.outputs.image }}
      tag:
        description: Image tag (commit SHA)
        value: ${{ jobs.build-and-push.outputs.tag }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      - id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mse-radar" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./astro
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && format('{0}:latest', steps.meta.outputs.image) || '' }}
