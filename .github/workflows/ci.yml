name: CI

on:
  push:
    paths:
      - 'astro/**'
      - 'db/**'
      - 'deno_scripts/**'

env:
  CI: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deno:
    name: Deno checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno lint
        run: deno lint

      - name: Deno format check
        run: deno fmt --check

      - name: Deno unit tests (deno_scripts)
        run: deno task test:unit

  astro:
    name: Astro checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: mse_radar
          POSTGRES_PASSWORD: mse_radar
          POSTGRES_DB: mse_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mse_radar:mse_radar@localhost:5432/mse_radar
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_URL: http://localhost:4321
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        working-directory: astro
        run: npm ci

      - name: Typecheck
        working-directory: astro
        run: npx astro check

      - name: Format check
        working-directory: astro
        run: npm run format:check

      - name: Build
        working-directory: astro
        run: npm run build

      - name: Tests (Vitest)
        working-directory: astro
        run: npm test
