name: CI

on:
  push:
    paths:
      - 'astro/**'
      - 'db/**'
      - 'deno_scripts/**'

env:
  CI: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deno:
    name: Deno checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: v2.x

      - name: Deno lint
        run: deno lint

      - name: Deno format check
        run: deno fmt --check

      - name: Deno unit tests (deno_scripts)
        run: deno task test:unit

  astro:
    name: Astro checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        working-directory: astro
        run: npm ci

      - name: Typecheck
        working-directory: astro
        run: npx astro check

      - name: Format check
        working-directory: astro
        run: npm run format:check

      - name: Build
        working-directory: astro
        run: npm run build

      - name: Tests (Vitest)
        working-directory: astro
        run: npm test
