services:
  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: mse_radar
      POSTGRES_PASSWORD: mse_radar
      POSTGRES_DB: mse_radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mse_radar']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
